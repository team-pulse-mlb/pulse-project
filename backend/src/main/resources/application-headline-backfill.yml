spring:
  main:
    web-application-type: none
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  rabbitmq:
    listener:
      simple:
        # 일회성 배치가 운영 score.tasks 큐를 소비하지 않게 한다.
        auto-startup: false

pulse:
  poller:
    enabled: false
  scorer:
    # 실제 생성기와 Redis 재조회 신호 발행 빈만 사용한다.
    enabled: true
  ai:
    event-copy-retry:
      enabled: false
  sse:
    enabled: false
  headline-backfill:
    # 비우면 헤드라인이 하나라도 누락된 전체 종료 경기를 처리한다.
    game-ids: []
  notification-outbox:
    # 백필 프로세스가 운영 알림 outbox를 대신 발행하지 않게 한다.
    scheduler-enabled: false
