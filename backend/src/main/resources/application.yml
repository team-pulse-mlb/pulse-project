spring:
  application:
    name: pulse
  config:
    import:
      - classpath:scoring.yml

      # 로컬 개발용 프로젝트 루트 .env
      #
      # IntelliJ의 Working directory가 backend 폴더라는 기준으로
      # ../.env가 프로젝트 루트의 .env를 가리킵니다.
      #
      # 운영 환경에는 이 파일이 없어도 optional이므로 정상 실행됩니다.
      - "optional:file:../.env[.properties]"

  flyway:
    enabled: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
  jpa:
    hibernate:
      # 기본값은 스키마를 건드리지 않는다. 프로파일 없이 운영 DB에 붙어도 안전하도록 none을 유지하고,
      # 로컬 개발에서 스키마 자동 반영이 필요하면 local 프로파일을 켠다(application-local.yml).
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pulse}
    password: ${RABBITMQ_PASSWORD:pulse}
    publisher-confirm-type: correlated
    listener:
      simple:
        default-requeue-rejected: false   # 처리 실패 메시지는 재큐잉 대신 DLQ로


  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true
            required: true

          ssl:
            trust: ${MAIL_HOST:smtp.gmail.com}

        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jwt:
  secret: ${JWT_SECRET}           # JWT에 서명하고 검증할 서버 비밀키
  access-token-expiration: 15m    # 15분
  refresh-token-expiration: 7d    # 7일

app:
  cors:
    # CORS 허용 오리진. 로컬은 Vite 개발 서버만 허용한다.
    # 배포 환경에서는 CORS_ALLOWED_ORIGINS로 프론트 커스텀 도메인을 주입한다(application-prod.yml 참고).
    # 오리진은 스킴·호스트·포트까지 정확히 일치해야 하고 마지막 슬래시는 넣지 않는다.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cookie:
    refresh-token:
      # 로컬 개발 환경은 http://localhost 이므로 false
      # 배포 HTTPS 환경에서는 REFRESH_TOKEN_COOKIE_SECURE=true 로 설정한다.
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}

      # 현재 로컬 프론트/백엔드 구조에서는 Lax가 안전하다.
      # 만약 배포에서 프론트와 백엔드가 완전히 다른 사이트로 분리되고
      # 크로스사이트 쿠키가 필요하면 None으로 바꿔야 할 수 있다.
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}

      # refreshToken 쿠키가 전송될 경로
      # 기존 코드가 /api/members 범위를 쓰고 있다면 이 값을 유지한다.
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/members}

      # 프론트와 백엔드를 서로 다른 HTTPS 도메인으로 배포할 경우 설정합니다.
      # SameSite=None을 사용할 때는 Secure=true가 반드시 함께 적용되어야 합니다.
      # REFRESH_TOKEN_COOKIE_SECURE=true
      # REFRESH_TOKEN_COOKIE_SAME_SITE=None


pulse:
  simulation:
    enabled: ${PULSE_SIMULATION_ENABLED:false}
    source-game-id: ${PULSE_SIMULATION_SOURCE_GAME_ID:}
    target-game-id: ${PULSE_SIMULATION_TARGET_GAME_ID:}
    # 다중 경기 데모 연출. simulation.enabled=true일 때만 쓰인다(운영은 prod에서 false 고정).
    # source-game-id는 seed-dev-slate.sh가 적재한 원본(플레이 100개 이상)이다.
    games:
      - { source-game-id: 8800000004, target-game-id: 14059224001, start-offset: 6m, preset: START }   # 진행
      - { source-game-id: 8800000006, target-game-id: 14059226001, start-offset: -3h, preset: START }  # 예정
      - { source-game-id: 8800000006, target-game-id: 14059226002, start-offset: 0s, preset: FINISH }  # 곧 종료
    speed: ${PULSE_SIMULATION_SPEED:1}
    start-offset: ${PULSE_SIMULATION_START_OFFSET:0s}
    play-interval: ${PULSE_SIMULATION_PLAY_INTERVAL:20s}
    preset: ${PULSE_SIMULATION_PRESET:START}
    archive-date: ${PULSE_SIMULATION_ARCHIVE_DATE:}
    s3:
      bucket: ${PULSE_SIMULATION_S3_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
    max-archive-objects: ${PULSE_SIMULATION_MAX_ARCHIVE_OBJECTS:1000}
  bdl:
    base-url: https://api.balldontlie.io
    api-key: ${BDL_API_KEY:}
    connect-timeout: ${PULSE_BDL_CONNECT_TIMEOUT:2s}
    read-timeout: ${PULSE_BDL_READ_TIMEOUT:10s}
  ai:
    base-url: ${PULSE_AI_BASE_URL:http://localhost:8000}
    event-copy-retry:
      delay: ${PULSE_AI_EVENT_COPY_RETRY_DELAY:180s}
      window: ${PULSE_AI_EVENT_COPY_RETRY_WINDOW:6h}
      max-attempts: ${PULSE_AI_EVENT_COPY_RETRY_MAX_ATTEMPTS:3}
      batch-size: ${PULSE_AI_EVENT_COPY_RETRY_BATCH_SIZE:50}
    play-translation:
      max-attempts: ${PULSE_AI_PLAY_TRANSLATION_MAX_ATTEMPTS:3}
      batch-size: ${PULSE_AI_PLAY_TRANSLATION_BATCH_SIZE:10}
  replay:
    s3:
      bucket: ${PULSE_REPLAY_S3_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
    max-objects-per-prefix: ${PULSE_REPLAY_MAX_OBJECTS_PER_PREFIX:200}
  poller:
    enabled: ${PULSE_POLLER_ENABLED:false}
    tick-delay-ms: ${PULSE_POLLER_TICK_DELAY_MS:20000}
    tick-interval: ${PULSE_POLLER_TICK_INTERVAL:20s}
    # 동시 라이브 15경기 기준 분당 약 12건의 RabbitMQ task 증가이며 외부 API 호출은 늘지 않는다.
    heartbeat-interval: ${PULSE_POLLER_HEARTBEAT_INTERVAL:75s}
    quiet-threshold: ${PULSE_POLLER_QUIET_THRESHOLD:10m}
    quiet-plays-interval: ${PULSE_POLLER_QUIET_PLAYS_INTERVAL:5m}
    idle-games-interval: ${PULSE_POLLER_IDLE_GAMES_INTERVAL:10m}
    scheduled-games-near-threshold: ${PULSE_POLLER_SCHEDULED_GAMES_NEAR_THRESHOLD:15m}
    scheduled-games-interval: ${PULSE_POLLER_SCHEDULED_GAMES_INTERVAL:20s}
    slate-lookback-days: ${PULSE_POLLER_SLATE_LOOKBACK_DAYS:1}
    slate-lookahead-days: ${PULSE_POLLER_SLATE_LOOKAHEAD_DAYS:2}
    max-play-pages-per-game: ${PULSE_POLLER_MAX_PLAY_PAGES_PER_GAME:5}
    initial-backoff: ${PULSE_POLLER_INITIAL_BACKOFF:30s}
    max-backoff: ${PULSE_POLLER_MAX_BACKOFF:5m}
    rate-limit-per-second: ${PULSE_POLLER_RATE_LIMIT_PER_SECOND:10}
    pregame-tick-delay-ms: ${PULSE_POLLER_PREGAME_TICK_DELAY_MS:60000}
    lineups-far-interval: ${PULSE_POLLER_LINEUPS_FAR_INTERVAL:1h}
    lineups-near-interval: ${PULSE_POLLER_LINEUPS_NEAR_INTERVAL:15m}
    odds-interval: ${PULSE_POLLER_ODDS_INTERVAL:30m}
    standings-batch-hour-utc: ${PULSE_POLLER_STANDINGS_BATCH_HOUR_UTC:10}
    pa-archive:
      bucket: ${PULSE_POLLER_PA_ARCHIVE_BUCKET:${PULSE_REPLAY_S3_BUCKET:}}
      region: ${AWS_REGION:ap-northeast-2}
  scorer:
    enabled: ${PULSE_SCORER_ENABLED:true}
    # SURGE 알림 빈도 제어 캐시의 비상 TTL. Redis 재시작 시 초기화되어도 허용한다.
    redis-emergency-ttl-ms: ${PULSE_SCORER_REDIS_EMERGENCY_TTL_MS:172800000}
    finalization-recovery-delay-ms: ${PULSE_SCORER_FINALIZATION_RECOVERY_DELAY_MS:900000}
    # 복구 스캔 대상을 최근 갱신 terminal 경기로 한정하는 창. finalized 키 비상 TTL보다 짧게 유지한다.
    finalization-recovery-window-ms: ${PULSE_SCORER_FINALIZATION_RECOVERY_WINDOW_MS:86400000}
  score-task-outbox:
    dispatch-delay: ${PULSE_SCORE_TASK_OUTBOX_DISPATCH_DELAY:5s}
    retry-initial-interval: ${PULSE_SCORE_TASK_OUTBOX_RETRY_INITIAL_INTERVAL:5s}
    retry-max-interval: ${PULSE_SCORE_TASK_OUTBOX_RETRY_MAX_INTERVAL:5m}
    batch-size: ${PULSE_SCORE_TASK_OUTBOX_BATCH_SIZE:50}
    confirm-timeout: ${PULSE_SCORE_TASK_OUTBOX_CONFIRM_TIMEOUT:10s}
    retention-period: ${PULSE_SCORE_TASK_OUTBOX_RETENTION_PERIOD:7d}
    cleanup-delay: ${PULSE_SCORE_TASK_OUTBOX_CLEANUP_DELAY:1h}
    cleanup-batch-size: ${PULSE_SCORE_TASK_OUTBOX_CLEANUP_BATCH_SIZE:500}
  notification-outbox:
    dispatch-delay: ${PULSE_NOTIFICATION_OUTBOX_DISPATCH_DELAY:5s}
    retry-initial-interval: ${PULSE_NOTIFICATION_OUTBOX_RETRY_INITIAL_INTERVAL:5s}
    retry-max-interval: ${PULSE_NOTIFICATION_OUTBOX_RETRY_MAX_INTERVAL:5m}
    batch-size: ${PULSE_NOTIFICATION_OUTBOX_BATCH_SIZE:50}
  sse:
    enabled: ${PULSE_SSE_ENABLED:true}
    heartbeat-interval: ${PULSE_SSE_HEARTBEAT_INTERVAL:25s}
    connection-ttl: ${PULSE_SSE_CONNECTION_TTL:60m}
    anonymous-max-connections: ${PULSE_SSE_ANONYMOUS_MAX_CONNECTIONS:1000}
    authenticated-max-connections: ${PULSE_SSE_AUTHENTICATED_MAX_CONNECTIONS:1000}
    broadcast-threads: ${PULSE_SSE_BROADCAST_THREADS:8}
    broadcast-queue-capacity: ${PULSE_SSE_BROADCAST_QUEUE_CAPACITY:1024}
  home:
    ranking-cache:
      ttl: ${PULSE_HOME_RANKING_CACHE_TTL:3s}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
