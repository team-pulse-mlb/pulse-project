spring:
  application:
    name: pulse
  config:
    import: classpath:scoring.yml
  flyway:
    enabled: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
  jpa:
    hibernate:
      ddl-auto: update    # 3주 프로젝트 기준. 스키마 확정 후 validate 전환 검토
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pulse}
    password: ${RABBITMQ_PASSWORD:pulse}
    listener:
      simple:
        default-requeue-rejected: false   # 처리 실패 메시지는 재큐잉 대신 DLQ로


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true
            required: true

          ssl:
            trust: smtp.gmail.com

        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jwt:
  secret: ${JWT_SECRET}           # JWT에 서명하고 검증할 서버 비밀키
  access-token-expiration: 15m    # 15분
  refresh-token-expiration: 7d    # 7일

app:
  cookie:
    refresh-token:
      # 로컬 개발 환경은 http://localhost 이므로 false
      # 배포 HTTPS 환경에서는 REFRESH_TOKEN_COOKIE_SECURE=true 로 설정한다.
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}

      # 현재 로컬 프론트/백엔드 구조에서는 Lax가 안전하다.
      # 만약 배포에서 프론트와 백엔드가 완전히 다른 사이트로 분리되고
      # 크로스사이트 쿠키가 필요하면 None으로 바꿔야 할 수 있다.
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}

      # refreshToken 쿠키가 전송될 경로
      # 기존 코드가 /api/members 범위를 쓰고 있다면 이 값을 유지한다.
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/members}

      # 프론트와 백엔드를 서로 다른 HTTPS 도메인으로 배포할 경우 설정합니다.
      # SameSite=None을 사용할 때는 Secure=true가 반드시 함께 적용되어야 합니다.
      # REFRESH_TOKEN_COOKIE_SECURE=true
      # REFRESH_TOKEN_COOKIE_SAME_SITE=None


pulse:
  bdl:
    base-url: https://api.balldontlie.io
    api-key: ${BDL_API_KEY:}
  replay:
    s3:
      bucket: ${PULSE_REPLAY_S3_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
    max-objects-per-prefix: ${PULSE_REPLAY_MAX_OBJECTS_PER_PREFIX:200}
  poller:
    enabled: ${PULSE_POLLER_ENABLED:false}
    tick-delay-ms: ${PULSE_POLLER_TICK_DELAY_MS:20000}
    tick-interval: ${PULSE_POLLER_TICK_INTERVAL:20s}
    idle-games-interval: ${PULSE_POLLER_IDLE_GAMES_INTERVAL:10m}
    slate-lookback-days: ${PULSE_POLLER_SLATE_LOOKBACK_DAYS:1}
    slate-lookahead-days: ${PULSE_POLLER_SLATE_LOOKAHEAD_DAYS:1}
    max-play-pages-per-game: ${PULSE_POLLER_MAX_PLAY_PAGES_PER_GAME:5}
    initial-backoff: ${PULSE_POLLER_INITIAL_BACKOFF:30s}
    max-backoff: ${PULSE_POLLER_MAX_BACKOFF:5m}
    rate-limit-per-second: ${PULSE_POLLER_RATE_LIMIT_PER_SECOND:10}
    pregame-tick-delay-ms: ${PULSE_POLLER_PREGAME_TICK_DELAY_MS:60000}
    lineups-far-interval: ${PULSE_POLLER_LINEUPS_FAR_INTERVAL:1h}
    lineups-near-interval: ${PULSE_POLLER_LINEUPS_NEAR_INTERVAL:15m}
    odds-interval: ${PULSE_POLLER_ODDS_INTERVAL:30m}
    standings-batch-hour-utc: ${PULSE_POLLER_STANDINGS_BATCH_HOUR_UTC:10}
    pa-archive:
      bucket: ${PULSE_POLLER_PA_ARCHIVE_BUCKET:${PULSE_REPLAY_S3_BUCKET:}}
      region: ${AWS_REGION:ap-northeast-2}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
