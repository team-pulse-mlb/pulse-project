spring:
  application:
    name: pulse
  config:
    import: classpath:scoring.yml
  flyway:
    enabled: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
  jpa:
    hibernate:
      ddl-auto: update    # 3주 프로젝트 기준. 스키마 확정 후 validate 전환 검토
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:pulse}
    password: ${RABBITMQ_PASSWORD:pulse}
    listener:
      simple:
        default-requeue-rejected: false   # 처리 실패 메시지는 재큐잉 대신 DLQ로


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true
            required: true

          ssl:
            trust: smtp.gmail.com

        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jwt:
  secret: ${JWT_SECRET}           # JWT에 서명하고 검증할 서버 비밀키
  access-token-expiration: 15m    # 15분
  refresh-token-expiration: 7d    # 7일

pulse:
  bdl:
    base-url: https://api.balldontlie.io
    api-key: ${BDL_API_KEY:}
  replay:
    s3:
      bucket: ${PULSE_REPLAY_S3_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
    max-objects-per-prefix: ${PULSE_REPLAY_MAX_OBJECTS_PER_PREFIX:200}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
