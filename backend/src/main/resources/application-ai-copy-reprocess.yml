spring:
  main:
    web-application-type: none
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

pulse:
  poller:
    enabled: false
  game-processor:
    enabled: true
  sse:
    enabled: false
  ai:
    event-copy-retry:
      enabled: false
  ai-copy-reprocess:
    event-batch-size: 100
    run-backfill: true
    run-headline: true
    run-event-copy: true
    run-play-translation: true
  notification-outbox:
    scheduler-enabled: false
  score-task-outbox:
    scheduler-enabled: false
