# PULSE 운영 Docker Compose (EC2)
#
# 같은 backend 이미지를 역할 게이트 환경 변수만 바꿔 pulse-api / pulse-poller / pulse-game-processor
# 3개 서비스로 재사용한다. 배포 절차와 환경 변수 목록은 docs/ops/OPERATIONS.md를 따른다.
#
# 배치 기준: EC2에 이 파일과 prod/ 디렉터리, .env를 같은 위치에 두고 실행한다.
#   docker compose -f docker-compose.prod.yml up -d
#
# 역할 게이트 조합 (docs/architecture/ARCHITECTURE.md, WORK_PLAN 2-1):
#   api            = poller off · game-processor off · sse on  · Flyway 실행(prod 프로파일)
#   poller         = poller on  · game-processor off · sse off · Flyway 끔
#   game processor = poller off · game-processor on  · sse off · Flyway 끔
# Flyway는 pulse-api 1곳에서만 실행해 동시 기동 마이그레이션 경합을 막는다.
# poller·game processor는 pulse-api 헬스 통과(=마이그레이션 완료) 후 기동한다.
#
# 관리 포트: 세 역할 모두 actuator를 8081(관리 포트)로 분리한다. 호스트에 publish하지
# 않으며 헬스체크와 Prometheus scrape만 compose 내부 네트워크에서 접근한다.

x-app-logging: &app-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# backend 이미지 공통 골격. 역할별 env·힙 상한·메모리 상한은 각 서비스에서 지정한다.
# 메모리 상한 근거: 2026-07-18 라이브 15경기(02:00~16:00 KST) 1분 간격 실측.
#   호스트 피크 2,540MB/3,831MB, 컨테이너 RSS 피크 api 481·poller 489·game processor 471MB,
#   JVM 힙 피크 api 116/512·poller 118/256·game processor 102/384MB, 재시작·컨테이너 스왑 0.
#   상한은 실측 피크 + JVM 이론 상한(Xmx+Metaspace+코드캐시+스레드스택)을 덮는 값으로 잡는다.
#   상시 컨테이너 상한 합계 3,328MB < 호스트 3,831MB(스왑 2GB 별도).
x-app-base: &app-base
  image: ${PULSE_APP_IMAGE:?PULSE_APP_IMAGE required}
  env_file: .env
  restart: unless-stopped
  logging: *app-logging

x-app-healthcheck: &app-healthcheck
  test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/actuator/health"]
  interval: 30s
  timeout: 5s
  retries: 5
  start_period: 120s

services:
  pulse-api:
    <<: *app-base
    container_name: pulse-api
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PULSE_POLLER_ENABLED: "false"
      PULSE_GAMEPROCESSOR_ENABLED: "false"
      PULSE_SSE_ENABLED: "true"
      PULSE_NOTIFICATION_CONSUMER_ENABLED: "true"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      MANAGEMENT_SERVER_PORT: "8081"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      # 2026-07-18 실측: 힙 피크 116MB/512MB, RSS 피크 481MB. 현행 유지.
      JAVA_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=192m -XX:+UseSerialGC -Xss512k"
      # RDS db.t3.micro(max_connections≈112) 예산: api 10 + poller 5 + game processor 8 = 23.
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      # SSE는 비동기 전송이라 요청 스레드를 점유하지 않는다. 기본 200은 과대해 축소.
      SERVER_TOMCAT_THREADS_MAX: "50"
    mem_limit: 768m
    ports:
      # 공개 진입점은 호스트 nginx(80/443)이며 API 포트는 로컬 프록시에서만 접근한다.
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *app-healthcheck

  pulse-poller:
    <<: *app-base
    container_name: pulse-poller
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PULSE_POLLER_ENABLED: "true"
      PULSE_GAMEPROCESSOR_ENABLED: "false"
      PULSE_SSE_ENABLED: "false"
      PULSE_NOTIFICATION_CONSUMER_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "false"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      MANAGEMENT_SERVER_PORT: "8081"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      # 2026-07-18 실측: 힙 피크 118MB/256MB, RSS 피크 489MB. 현행 유지.
      JAVA_OPTS: "-Xmx256m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"
      # 폴러는 HTTP 트래픽이 없고 actuator 스크레이프만 받는다.
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SERVER_TOMCAT_THREADS_MAX: "20"
    mem_limit: 640m
    # 장애 격리를 위해 인프라 서비스에만 의존한다. api 헬스체크 실패가 폴러 기동을 막지 않게 한다.
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *app-healthcheck

  pulse-game-processor:
    <<: *app-base
    container_name: pulse-game-processor
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PULSE_POLLER_ENABLED: "false"
      PULSE_GAMEPROCESSOR_ENABLED: "true"
      PULSE_SSE_ENABLED: "false"
      PULSE_NOTIFICATION_CONSUMER_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "false"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      MANAGEMENT_SERVER_PORT: "8081"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      # 2026-07-18 실측: 힙 피크 102MB/384MB, RSS 피크 471MB. 현행 유지.
      JAVA_OPTS: "-Xmx384m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"
      # 경기 처리기는 RabbitMQ 소비가 주 작업이라 HTTP 스레드는 actuator 몫만 필요.
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "8"
      SERVER_TOMCAT_THREADS_MAX: "20"
    mem_limit: 704m
    # 장애 격리를 위해 인프라 서비스에만 의존한다. api·ai-service 헬스체크 실패가 경기 처리기 기동을 막지 않게 한다.
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck: *app-healthcheck

  redis:
    # Redis는 영속 상태를 보관하지 않는 순수 캐시다. 볼륨·AOF를 추가하지 않으며 라이브 랭킹은 game processor 기동 시 DB에서 복원한다.
    image: redis:7-alpine
    container_name: pulse-redis
    restart: unless-stopped
    logging: *app-logging
    # 2026-07-18 실측 RSS 피크 10MB.
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pulse-rabbitmq
    # RabbitMQ는 큐 데이터를 노드명(rabbit@호스트명) 디렉터리에 저장한다.
    # 호스트명을 고정하지 않으면 컨테이너 재생성 때마다 새 노드로 초기화되어
    # named volume이 있어도 미소비 메시지가 유실된다.
    hostname: rabbitmq
    restart: unless-stopped
    logging: *app-logging
    # 2026-07-18 실측 RSS 피크 188MB.
    mem_limit: 384m
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    ports:
      # management UI는 외부 미개방. SSH/SSM 터널로만 접근한다.
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: pulse-prometheus
    restart: unless-stopped
    logging: *app-logging
    # 2026-07-18 실측 RSS 피크 148MB(보존 15d).
    mem_limit: 256m
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      # 외부 미개방. SSH/SSM 터널로만 접근한다.
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prod/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    container_name: pulse-grafana
    restart: unless-stopped
    logging: *app-logging
    # 2026-07-18 실측 RSS 피크 89MB.
    mem_limit: 192m
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
    ports:
      # 외부 미개방. 대시보드 접근 방식(터널 또는 개방)은 운영·관측 담당과 확정한다.
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./prod/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # game processor가 pulse.ai.base-url=http://ai-service:8000으로 호출하는 AI 문구 서버.
  ai-service:
    image: ${PULSE_AI_IMAGE:?PULSE_AI_IMAGE required}
    container_name: pulse-ai-service
    restart: unless-stopped
    logging: *app-logging
    # 2026-07-18 실측 RSS 피크 133MB.
    mem_limit: 256m
    environment:
      # 키가 없어도 헬스 서버는 기동하고, 실제 생성 요청은 ai-service가 명시적으로 실패 처리한다.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- 일회성 배치 (docker compose --profile batch run --rm ...) ----
  # 상시 기동하지 않으며 run으로만 실행한다. 파라미터는 JAVA_OPTS의 -D 시스템 프로퍼티로 넘긴다.
  # 실행 예시는 docs/ops/OPERATIONS.md의 "일회성 배치" 절을 따른다.
  # 배치는 동시에 1개만 실행한다는 전제로 mem_limit 640m(2026-07-18 실측 배치 RSS 피크 437MB).

  pulse-replay:
    <<: *app-base
    profiles: ["batch"]
    restart: "no"
    mem_limit: 640m
    environment:
      # 기본 프로파일 ddl-auto가 none이라 prod 누락 시에도 스키마는 안전하지만, 운영 설정 일관성을 위해 prod를 명시한다.
      SPRING_PROFILES_ACTIVE: prod,replay
      PULSE_POLLER_ENABLED: "false"
      PULSE_GAMEPROCESSOR_ENABLED: "false"
      PULSE_SSE_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "false"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      # pulse.replay.date(필수)·pulse.replay.game-id는 실행 시 JAVA_OPTS -D로 덮어쓴다.
      JAVA_OPTS: "-Xmx384m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"

  pulse-rescore:
    <<: *app-base
    profiles: ["batch"]
    restart: "no"
    mem_limit: 640m
    environment:
      # rescore 프로파일이 ddl-auto none·flyway off·game-processor off를 자체 지정한다.
      SPRING_PROFILES_ACTIVE: rescore
      PULSE_POLLER_ENABLED: "false"
      PULSE_SSE_ENABLED: "false"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JAVA_OPTS: "-Xmx384m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"

  pulse-headline-backfill:
    <<: *app-base
    profiles: ["batch"]
    restart: "no"
    mem_limit: 640m
    environment:
      SPRING_PROFILES_ACTIVE: prod,headline-backfill
      PULSE_POLLER_ENABLED: "false"
      PULSE_GAMEPROCESSOR_ENABLED: "true"
      PULSE_SSE_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: "false"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      # pulse.headline-backfill.game-ids는 실행 시 JAVA_OPTS -D로 선택 지정한다.
      JAVA_OPTS: "-Xmx384m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  pulse-ai-copy-reprocess:
    <<: *app-base
    profiles: ["batch"]
    restart: "no"
    mem_limit: 640m
    environment:
      SPRING_PROFILES_ACTIVE: prod,ai-copy-reprocess
      PULSE_POLLER_ENABLED: "false"
      PULSE_GAMEPROCESSOR_ENABLED: "true"
      PULSE_SSE_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: "false"
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JAVA_OPTS: "-Xmx384m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  # GitHub Actions가 SSM으로 요청하는 가중치 영향 백테스트다.
  # 운영 .env를 읽지 않고 백테스트 전용 읽기 계정과 실행 인자만 담은 임시 env 파일을 사용한다.
  pulse-backtest-impact:
    image: ${PULSE_APP_IMAGE:?PULSE_APP_IMAGE required}
    profiles: ["batch"]
    restart: "no"
    mem_limit: 640m
    env_file:
      - path: ${PULSE_BACKTEST_ENV_FILE:-/tmp/pulse-backtest-not-configured.env}
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: backtest
      PULSE_POLLER_ENABLED: "false"
      PULSE_GAMEPROCESSOR_ENABLED: "false"
      PULSE_SSE_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: "false"
      JAVA_OPTS: "-Xmx384m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC -Xss512k"
    logging: *app-logging

volumes:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
