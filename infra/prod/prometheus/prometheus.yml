# PULSE 운영 Prometheus 설정.
# 세 backend 역할의 actuator 관리 포트(8081)를 compose 내부 네트워크에서 scrape한다.
# /actuator/prometheus는 compose 내부 네트워크에서만 접근한다.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: pulse-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["pulse-api:8081"]
        labels:
          role: api
      - targets: ["pulse-poller:8081"]
        labels:
          role: poller
      - targets: ["pulse-game-processor:8081"]
        labels:
          role: scorer
