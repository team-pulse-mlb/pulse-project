schemaVersion: "2.2"
description: PULSE 추천 점수 백테스트를 고정된 EC2 실행 스크립트로 수행한다.
parameters:
  ArtifactBucket:
    type: String
    description: 백테스트 입출력 S3 버킷
    allowedPattern: "^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$"
  ArtifactPrefix:
    type: String
    description: PR 커밋별 임시 S3 prefix
    allowedPattern: "^backtest/pr/[0-9]+/[0-9a-f]{40}$"
  PullRequest:
    type: String
    description: GitHub PR 번호
    allowedPattern: "^[0-9]+$"
  CommitSha:
    type: String
    description: PR head 커밋 SHA
    allowedPattern: "^[0-9a-f]{40}$"
  FromDate:
    type: String
    description: 백테스트 시작일 UTC
    allowedPattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
  ToDate:
    type: String
    description: 백테스트 종료일 UTC
    allowedPattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
mainSteps:
  - action: aws:runShellScript
    name: runBacktestImpact
    inputs:
      timeoutSeconds: "5400"
      runCommand:
        - >-
          /usr/local/bin/pulse-backtest-impact
          "{{ ArtifactBucket }}"
          "{{ ArtifactPrefix }}"
          "{{ PullRequest }}"
          "{{ CommitSha }}"
          "{{ FromDate }}"
          "{{ ToDate }}"
