name: frontend-ci

on:
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.pulsemlb.com
        run: npm run build
