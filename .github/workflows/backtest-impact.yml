name: backtest-impact

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "backend/src/main/resources/scoring.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: backtest-impact
  cancel-in-progress: false

jobs:
  report:
    if: >-
      startsWith(github.event.pull_request.title, 'tune:') &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 105
    env:
      AWS_REGION: ap-northeast-2
      ARTIFACT_BUCKET: ${{ vars.DEPLOY_S3_BUCKET }}
      INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PULL_REQUEST: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate scoring change
        id: scoring
        shell: bash
        run: |
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if [ "${#changed_files[@]}" -ne 1 ] \
              || [ "${changed_files[0]}" != "backend/src/main/resources/scoring.yml" ]; then
            echo "tune PR에는 scoring.yml 변경만 포함해야 한다." >&2
            printf '%s\n' "${changed_files[@]}" >&2
            exit 1
          fi

          git show "$BASE_SHA:backend/src/main/resources/scoring.yml" > /tmp/scoring-base.yml
          cp backend/src/main/resources/scoring.yml /tmp/scoring-candidate.yml

          base_version=$(awk '/^[[:space:]]*version:[[:space:]]*[0-9]+/{print $2; exit}' /tmp/scoring-base.yml)
          candidate_version=$(awk '/^[[:space:]]*version:[[:space:]]*[0-9]+/{print $2; exit}' /tmp/scoring-candidate.yml)
          if ! [[ "$base_version" =~ ^[0-9]+$ && "$candidate_version" =~ ^[0-9]+$ ]]; then
            echo "변경 전·후 scoring version을 읽지 못했다." >&2
            exit 1
          fi
          if [ "$candidate_version" -le "$base_version" ]; then
            echo "scoring.yml 변경 시 version을 올려야 한다: v$base_version -> v$candidate_version" >&2
            exit 1
          fi

          to_date=$(date -u -d 'yesterday' +%F)
          from_date=$(date -u -d "$to_date - 13 days" +%F)
          prefix="backtest/pr/$PULL_REQUEST/$HEAD_SHA"
          {
            echo "base_version=$base_version"
            echo "candidate_version=$candidate_version"
            echo "from_date=$from_date"
            echo "to_date=$to_date"
            echo "prefix=$prefix"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backtest components
        working-directory: backend
        run: >-
          ./gradlew test
          --tests 'com.pulse.replay.backtest.*'

      - name: Configure AWS credentials
        id: aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BACKTEST_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload scoring inputs
        run: |
          aws s3 cp /tmp/scoring-base.yml \
            "s3://$ARTIFACT_BUCKET/${{ steps.scoring.outputs.prefix }}/input/base.yml" \
            --only-show-errors
          aws s3 cp /tmp/scoring-candidate.yml \
            "s3://$ARTIFACT_BUCKET/${{ steps.scoring.outputs.prefix }}/input/candidate.yml" \
            --only-show-errors

      - name: Run backtest through SSM
        env:
          FROM_DATE: ${{ steps.scoring.outputs.from_date }}
          TO_DATE: ${{ steps.scoring.outputs.to_date }}
          ARTIFACT_PREFIX: ${{ steps.scoring.outputs.prefix }}
        run: |
          parameters=$(jq -n \
            --arg bucket "$ARTIFACT_BUCKET" \
            --arg prefix "$ARTIFACT_PREFIX" \
            --arg pullRequest "$PULL_REQUEST" \
            --arg commitSha "$HEAD_SHA" \
            --arg fromDate "$FROM_DATE" \
            --arg toDate "$TO_DATE" \
            '{
              ArtifactBucket: [$bucket],
              ArtifactPrefix: [$prefix],
              PullRequest: [$pullRequest],
              CommitSha: [$commitSha],
              FromDate: [$fromDate],
              ToDate: [$toDate]
            }')

          command_id=$(aws ssm send-command \
            --document-name PulseBacktestImpact \
            --instance-ids "$INSTANCE_ID" \
            --parameters "$parameters" \
            --timeout-seconds 5400 \
            --comment "PULSE backtest PR #$PULL_REQUEST" \
            --query 'Command.CommandId' \
            --output text)

          status=Pending
          for _ in $(seq 1 360); do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo Pending)
            case "$status" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 15
          done

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json
          test "$status" = Success

      - name: Download report
        run: |
          mkdir -p backtest-results
          aws s3 cp \
            "s3://$ARTIFACT_BUCKET/${{ steps.scoring.outputs.prefix }}/output/" \
            backtest-results/ \
            --recursive \
            --only-show-errors
          test "$(find backtest-results -maxdepth 1 -name 'impact_*.md' | wc -l)" -eq 1
          test "$(find backtest-results -maxdepth 1 -name 'impact_*.json' | wc -l)" -eq 1

      - name: Report guard flags
        run: |
          report=$(find backtest-results -maxdepth 1 -name 'impact_*.json' -print -quit)
          mapfile -t guards < <(jq -r '.guardFlags[]?' "$report")
          if [ "${#guards[@]}" -eq 0 ]; then
            echo "### 백테스트 경보" >> "$GITHUB_STEP_SUMMARY"
            echo "- 없음" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "### 백테스트 경보" >> "$GITHUB_STEP_SUMMARY"
          for guard in "${guards[@]}"; do
            echo "::warning title=백테스트 경보::$guard"
            echo "- $guard" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-impact-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: backtest-results/
          if-no-files-found: error
          retention-days: 30

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const marker = "## 추천 점수 상수 변경 영향 리포트";
            const markdownFile = fs.readdirSync("backtest-results")
              .find(file => file.startsWith("impact_") && file.endsWith(".md"));
            if (!markdownFile) {
              throw new Error("백테스트 Markdown 리포트를 찾지 못했습니다.");
            }
            const report = fs.readFileSync(path.join("backtest-results", markdownFile), "utf8")
              .replace(/^# 가중치 백테스트 영향 리포트\s*/, "");
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\n\n${report}\n\n` +
              `- 상세 JSON·Markdown: [GitHub Actions 아티팩트](${runUrl})\n` +
              `- 경보 플래그는 현재 PR 병합을 차단하지 않으며 운영 결과 확인 후 실패 기준을 확정한다.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(comment => comment.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Clean temporary S3 objects
        if: always() && steps.aws.outcome == 'success'
        run: >-
          aws s3 rm
          "s3://$ARTIFACT_BUCKET/${{ steps.scoring.outputs.prefix }}/"
          --recursive
          --only-show-errors
