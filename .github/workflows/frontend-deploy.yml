# 프론트엔드를 S3 + CloudFront로 배포한다.
#
# 동작
#   1. frontend를 빌드하고(VITE_API_BASE_URL 주입)
#   2. 해시 자산은 장기 캐시로, index.html은 no-cache로 S3에 올린 뒤
#   3. CloudFront에서 /index.html을 무효화해 새 버전을 즉시 노출한다.
#
# 사전 준비(저장소 Settings)
#   Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (S3·CloudFront 권한을 가진 배포용 IAM 사용자)
#   Variables: FRONTEND_S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, VITE_API_BASE_URL
#
# 리소스가 준비되기 전에는(변수 미설정) 빌드까지만 하고 배포는 건너뛴다.

name: frontend-deploy

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-deploy.yml"]
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-2
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Check deploy target configured
        id: target
        run: |
          if [ -n "$FRONTEND_S3_BUCKET" ] && [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "배포 대상 변수(FRONTEND_S3_BUCKET·CLOUDFRONT_DISTRIBUTION_ID) 미설정 — 배포 건너뜀"
          fi

      - name: Configure AWS credentials
        if: steps.target.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 해시가 붙은 자산은 내용이 바뀌면 파일명이 바뀌므로 장기 불변 캐시로 올린다.
      # index.html은 항상 최신을 받아야 하므로 이 단계에서 제외하고, 제외된 파일은 삭제 대상에서도 빠진다.
      - name: Upload hashed assets
        if: steps.target.outputs.ready == 'true'
        working-directory: frontend
        run: |
          aws s3 sync dist/ "s3://$FRONTEND_S3_BUCKET/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      # index.html은 캐시하지 않는다(항상 최신 자산 해시를 참조).
      - name: Upload index.html (no-cache)
        if: steps.target.outputs.ready == 'true'
        working-directory: frontend
        run: |
          aws s3 cp dist/index.html "s3://$FRONTEND_S3_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        if: steps.target.outputs.ready == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
