metadata:
  version: 1
  locale: "ko-KR"
  source_language: "en"
  target_language: "ko"
  purpose: "PLAY_TRANSLATION"
  description: "MLB Play Result 원문을 한국 야구 중계·기록 용어로 번역하기 위한 용어집"
  unknown_term_policy: "reject"

output_policy:
  preferred_format: "{player}, {result}"
  preserve_player_names: true
  preserve_numbers: true
  preserve_distances: true
  preserve_base_numbers: true
  preserve_play_order: true
  one_play_per_translation: true
  maximum_sentences: 1
  allow_added_commentary: false
  allow_added_score: false
  allow_added_inning: false
  allow_added_player: false
  allow_added_winner: false
  allow_added_emotion: false
  transliterate_player_names: false

non_player_entities:
  # 팀명·도시명·리그명처럼 선수명이 아닌 영문 고유명사를
  # PLAY_TRANSLATION 선수명 보존 검사에서 제외하기 위한 목록입니다.
  #
  # 목적:
  # - "Philadelphia Phillies"가 원문에 있고 번역문이 "필라델피아 필리스"인 경우,
  #   Philadelphia / Phillies를 선수명 누락으로 오탐하지 않게 합니다.
  # - 실제 선수명은 계속 보존 검사 대상입니다.
  #
  # 주의:
  # - 단독 도시명은 실제 선수 성씨와 충돌할 수 있으므로 필요한 값만 추가합니다.
  # - 정식 팀명처럼 긴 표현을 먼저 제거할 수 있도록 guard에서 길이 내림차순으로 처리합니다.

